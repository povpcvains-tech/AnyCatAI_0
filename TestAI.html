<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔍 AI Camera Detector</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: white;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        .app {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Видео с камеры */
        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* Canvas для рамок */
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* Верхняя панель */
        .header {
            position: relative;
            z-index: 10;
            padding: 15px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status {
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff4444;
            animation: pulse 2s infinite;
        }

        .status-dot.active { background: #00ff88; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .toggle-camera {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 1.3em;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        /* Нижняя панель со статистикой */
        .footer {
            position: relative;
            z-index: 10;
            padding: 15px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            max-height: 40%;
            overflow-y: auto;
        }

        .stats-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .stat-chip {
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid rgba(0, 255, 136, 0.4);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85em;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .objects-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .object-tag {
            background: rgba(255,255,255,0.15);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .object-tag .conf {
            color: #00ff88;
            font-weight: bold;
            font-size: 0.85em;
        }

        /* Экран загрузки / ошибок */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
        }

        .overlay.hidden { display: none; }

        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #00ff88;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .overlay h2 { margin-bottom: 15px; font-size: 1.4em; }
        .overlay p { opacity: 0.8; margin-bottom: 25px; line-height: 1.5; }

        .btn {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #000;
            border: none;
            padding: 16px 40px;
            border-radius: 30px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            margin: 5px;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid rgba(255,255,255,0.4);
            color: white;
        }

        /* Скрываем элементы когда нет детекции */
        .no-detection {
            text-align: center;
            padding: 20px;
            opacity: 0.6;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
<div class="app">
    <!-- Видео и канвас -->
    <video id="video" playsinline autoplay muted></video>
    <canvas id="canvas"></canvas>

    <!-- Верхняя панель -->
    <div class="header">
        <div class="status">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Загрузка...</span>
        </div>
        <button class="toggle-camera" id="toggleCam" title="Сменить камеру">🔄</button>
    </div>

    <!-- Нижняя панель -->
    <div class="footer">
        <div class="stats-bar">
            <div class="stat-chip">🎯 <span id="count">0</span> объектов</div>
            <div class="stat-chip">⚡ <span id="fps">0</span> FPS</div>
        </div>
        <div class="objects-list" id="objectsList">
            <div class="no-detection">Наведи камеру на что-нибудь 👆</div>
        </div>
    </div>

    <!-- Оверлей загрузки -->
    <div class="overlay" id="overlay">
        <div class="loader"></div>
        <h2>🤖 Загрузка ИИ-модели</h2>
        <p>Первый запуск может занять 20-40 секунд.<br>Модель скачается и будет работать офлайн.</p>
        <button class="btn" id="startBtn">Разрешить камеру и начать</button>
        <p style="font-size: 0.8em; opacity: 0.6; margin-top: 20px;">
            💡 Совет: используй заднюю камеру для лучших результатов
        </p>
    </div>

    <!-- Оверлей ошибок -->
    <div class="overlay hidden" id="errorOverlay">
        <h2>⚠️ Ошибка</h2>
        <p id="errorMsg">Не удалось получить доступ к камере</p>
        <button class="btn btn-outline" onclick="location.reload()">Попробовать снова</button>
    </div>
</div>

<script>
    // === Настройки ===
    const CONFIG = {
        minConfidence: 0.5,        // Мин. уверенность для отображения
        detectionInterval: 300,    // Проверка каждые 300мс (баланс скорость/точность)
        mobileOptimized: true,     // Оптимизации для слабых устройств
        useRearCamera: true        // По умолчанию задняя камера
    };

    // === Глобальные переменные ===
    let model = null;
    let video = document.getElementById('video');
    let canvas = document.getElementById('canvas');
    let ctx = canvas.getContext('2d');
    let isDetecting = false;
    let lastDetection = 0;
    let fpsCounter = { frames: 0, lastTime: performance.now() };
    let currentStream = null;
    let facingMode = CONFIG.useRearCamera ? 'environment' : 'user';

    // === DOM элементы ===
    const overlay = document.getElementById('overlay');
    const errorOverlay = document.getElementById('errorOverlay');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const countEl = document.getElementById('count');
    const fpsEl = document.getElementById('fps');
    const objectsList = document.getElementById('objectsList');
    const startBtn = document.getElementById('startBtn');
    const toggleCamBtn = document.getElementById('toggleCam');

    // === Инициализация ===
    async function init() {
        // Кнопка старта
        startBtn.onclick = async () => {
            try {
                await startCamera();
                await loadModel();
                overlay.classList.add('hidden');
                statusDot.classList.add('active');
                statusText.textContent = 'Работает';
                startDetection();
            } catch (err) {
                showError('Не удалось запустить: ' + err.message);
            }
        };

        // Переключение камеры
        toggleCamBtn.onclick = async () => {
            facingMode = facingMode === 'environment' ? 'user' : 'environment';
            await restartCamera();
        };

        // Ресайз канваса
        window.addEventListener('resize', resizeCanvas);
    }

    // === Запуск камеры ===
    async function startCamera() {
        if (currentStream) {
            currentStream.getTracks().forEach(t => t.stop());
        }

        const constraints = {
            video: {
                facingMode: { exact: facingMode },
                width: { ideal: 1280 },  // Оптимизировано для мобильных
                height: { ideal: 720 }
            },
            audio: false
        };

        try {
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
            currentStream = stream;
            await video.play();
            resizeCanvas();
        } catch (err) {
            // Пробуем без exact facingMode
            if (err.name === 'OverconstrainedError') {
                constraints.video.facingMode = facingMode;
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                currentStream = stream;
                await video.play();
                resizeCanvas();
            } else {
                throw err;
            }
        }
    }

    async function restartCamera() {
        statusText.textContent = 'Переключение...';
        statusDot.classList.remove('active');
        await startCamera();
        statusText.textContent = 'Работает';
        statusDot.classList.add('active');
    }

    function resizeCanvas() {
        // Синхронизируем размер канваса с видео
        const scale = window.devicePixelRatio || 1;
        canvas.width = video.videoWidth * scale;
        canvas.height = video.videoHeight * scale;
        canvas.style.width = video.clientWidth + 'px';
        canvas.style.height = video.clientHeight + 'px';
        ctx.scale(scale, scale);
    }

    // === Загрузка модели ===
    async function loadModel() {
        statusText.textContent = 'Загрузка модели...';
        // cocoSsd.load() автоматически кэширует модель
        model = await cocoSsd.load({
            base: 'lite_mobilenet_v2', // Легкая версия для мобильных!
            modelVersion: 2
        });
        statusText.textContent = 'Готово!';
    }

    // === Основной цикл детекции ===
    async function startDetection() {
        isDetecting = true;
        requestAnimationFrame(detectLoop);
    }

    async function detectLoop() {
        if (!isDetecting) return;

        // Считаем FPS
        fpsCounter.frames++;
        const now = performance.now();
        if (now - fpsCounter.lastTime >= 1000) {
            fpsEl.textContent = fpsCounter.frames;
            fpsCounter.frames = 0;
            fpsCounter.lastTime = now;
        }

        // Детекция с интервалом (не каждый кадр для производительности)
        if (now - lastDetection >= CONFIG.detectionInterval && video.readyState === 4) {
            lastDetection = now;
            try {
                const predictions = await model.detect(video);
                drawPredictions(predictions);
                updateUI(predictions);
            } catch (err) {
                console.warn('Ошибка детекции:', err);
            }
        }

        requestAnimationFrame(detectLoop);
    }

    // === Отрисовка рамок ===
    function drawPredictions(predictions) {
        // Очистка
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Настройки рисования
        ctx.lineWidth = 3;
        ctx.strokeStyle = '#00ff88';
        ctx.fillStyle = '#00ff88';
        ctx.font = 'bold 14px -apple-system, sans-serif';

        predictions.forEach(pred => {
            if (pred.score < CONFIG.minConfidence) return;

            const [x, y, width, height] = pred.bbox;
            const confidence = Math.round(pred.score * 100);

            // Рамка
            ctx.strokeRect(x, y, width, height);
            
            // Фон для текста
            const label = `${pred.class} ${confidence}%`;
            const textWidth = ctx.measureText(label).width;
            ctx.fillRect(x, y - 25, textWidth + 12, 25);
            
            // Текст
            ctx.fillStyle = '#000';
            ctx.fillText(label, x + 6, y - 8);
            ctx.fillStyle = '#00ff88'; // Возвращаем цвет
        });
    }

    // === Обновление интерфейса ===
    function updateUI(predictions) {
        const filtered = predictions.filter(p => p.score >= CONFIG.minConfidence);
        countEl.textContent = filtered.length;

        if (filtered.length === 0) {
            objectsList.innerHTML = '<div class="no-detection">Наведи камеру на что-нибудь 👆</div>';
            return;
        }

        // Группируем по классам
        const grouped = {};
        filtered.forEach(p => {
            if (!grouped[p.class]) grouped[p.class] = [];
            grouped[p.class].push(p.score);
        });

        objectsList.innerHTML = '';
        Object.entries(grouped).forEach(([className, scores]) => {
            const avgConf = Math.round(scores.reduce((a,b) => a+b, 0) / scores.length);
            const count = scores.length > 1 ? `×${scores.length}` : '';
            
            const tag = document.createElement('div');
            tag.className = 'object-tag';
            tag.innerHTML = `<span>${className}</span><span class="conf">${avgConf}%</span>${count}`;
            objectsList.appendChild(tag);
        });
    }

    // === Ошибки ===
    function showError(msg) {
        overlay.classList.add('hidden');
        document.getElementById('errorMsg').textContent = msg;
        errorOverlay.classList.remove('hidden');
        statusDot.classList.remove('active');
    }

    // === Старт ===
    init();

    // === Очистка при уходе со страницы ===
    window.addEventListener('beforeunload', () => {
        isDetecting = false;
        if (currentStream) {
            currentStream.getTracks().forEach(t => t.stop());
        }
    });
</script>
</body>
</html>
