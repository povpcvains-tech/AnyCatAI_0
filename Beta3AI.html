<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>👁️ AI Vision - Объекты 170+</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: white;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .matched-face {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 80px;
            height: 80px;
            border-radius: 12px;
            border: 3px solid #00ff88;
            box-shadow: 0 0 20px rgba(0,255,136,0.5);
            z-index: 20;
            display: none;
            object-fit: cover;
            background: #000;
        }
        .matched-face.show { display: block; }
        .status {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.8em;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff4444;
        }
        .status-dot.active { background: #00ff88; }
        .footer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 15px;
            max-height: 50%;
            overflow-y: auto;
            z-index: 10;
        }
        .stats {
            display: flex;
            gap: 12px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .stat {
            background: rgba(0,255,136,0.2);
            border: 1px solid rgba(0,255,136,0.4);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75em;
        }
        .section-title {
            font-size: 0.7em;
            color: #aaa;
            margin-top: 10px;
            margin-bottom: 5px;
        }
        .objects-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .object-tag {
            background: rgba(0,0,0,0.7);
            border-left: 3px solid #00ff88;
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 0.75em;
        }
        .buttons {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            z-index: 30;
        }
        .btn {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 0.9em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0,255,136,0.3);
        }
        .btn-outline {
            background: rgba(0,0,0,0.7);
            border: 1px solid #00ff88;
            color: #00ff88;
        }
        .btn.hidden { display: none; }
        .debug {
            position: absolute;
            bottom: 8px;
            right: 8px;
            font-size: 0.6em;
            background: rgba(0,0,0,0.6);
            padding: 4px 8px;
            border-radius: 8px;
            z-index: 10;
        }
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .loading.hidden { display: none; }
        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #00ff88;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .face-gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
            max-height: 100px;
            overflow-x: auto;
        }
        .face-thumb {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid #00ff88;
            cursor: pointer;
        }
        .remove-btn {
            background: rgba(255,0,0,0.7);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 0.6em;
            cursor: pointer;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <img id="matchedFace" class="matched-face">
    
    <div class="status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Загрузка...</span>
    </div>
    
    <div class="footer">
        <div class="stats">
            <div class="stat">🎯 <span id="objCount">0</span> объектов</div>
            <div class="stat">📚 <span id="dbCount">0</span> лиц в базе</div>
            <div class="stat">⚡ <span id="fps">0</span> FPS</div>
        </div>
        
        <div class="section-title">📦 Найденные объекты (170+):</div>
        <div class="objects-list" id="objectsList">
            <div class="object-tag">🔍 Наведи камеру...</div>
        </div>
        
        <div class="section-title">📸 Мои лица (нажми на фото чтобы удалить):</div>
        <div class="face-gallery" id="faceGallery"></div>
    </div>
    
    <div class="buttons">
        <button class="btn" id="cameraBtn">📷 КАМЕРА</button>
        <button class="btn btn-outline" id="addFaceBtn">➕ ДОБАВИТЬ ЛИЦО</button>
    </div>
    
    <div class="debug" id="debugInfo">⏳ Загрузка модели...</div>
    <div class="loading" id="loading">
        <div class="loader"></div>
        <h2>🧠 Загрузка ИИ</h2>
        <p>Загрузка модели распознавания объектов<br>(~2-3 секунды)</p>
    </div>
    
    <input type="file" id="faceUpload" accept="image/*" style="display:none">

<script>
    // === БАЗА ЛИЦ (хранится в памяти телефона) ===
    let faceDatabase = [];
    
    // === РАСШИРЕННЫЙ СЛОВАРЬ (170+ объектов) ===
    const objectNames = {
        "person": "👤 Человек", "bicycle": "🚲 Велосипед", "car": "🚗 Авто",
        "motorcycle": "🏍️ Мото", "airplane": "✈️ Самолёт", "bus": "🚌 Автобус",
        "train": "🚆 Поезд", "truck": "🚛 Грузовик", "boat": "⛵ Лодка",
        "traffic light": "🚦 Светофор", "bench": "🪑 Скамья", "bird": "🐦 Птица",
        "cat": "🐱 Кошка", "dog": "🐶 Собака", "horse": "🐴 Лошадь",
        "sheep": "🐑 Овца", "cow": "🐄 Корова", "elephant": "🐘 Слон",
        "bear": "🐻 Медведь", "backpack": "🎒 Рюкзак", "umbrella": "☔ Зонт",
        "handbag": "👜 Сумка", "tie": "👔 Галстук", "suitcase": "🧳 Чемодан",
        "frisbee": "🥏 Фрисби", "skis": "🎿 Лыжи", "snowboard": "🏂 Сноуборд",
        "sports ball": "⚽ Мяч", "kite": "🪁 Змей", "skateboard": "🛹 Скейт",
        "surfboard": "🏄 Доска", "tennis racket": "🎾 Ракетка", "bottle": "🍾 Бутылка",
        "wine glass": "🍷 Бокал", "cup": "🥤 Чашка", "fork": "🍴 Вилка",
        "knife": "🔪 Нож", "spoon": "🥄 Ложка", "bowl": "🥣 Миска",
        "banana": "🍌 Банан", "apple": "🍎 Яблоко", "sandwich": "🥪 Сэндвич",
        "orange": "🍊 Апельсин", "broccoli": "🥦 Брокколи", "carrot": "🥕 Морковь",
        "hot dog": "🌭 Хот-дог", "pizza": "🍕 Пицца", "donut": "🍩 Пончик",
        "cake": "🍰 Торт", "chair": "🪑 Стул", "couch": "🛋️ Диван",
        "potted plant": "🌱 Растение", "bed": "🛏️ Кровать", "dining table": "🍽️ Стол",
        "toilet": "🚽 Унитаз", "tv": "📺 ТВ", "laptop": "💻 Ноутбук",
        "mouse": "🖱️ Мышь", "keyboard": "⌨️ Клавиатура", "cell phone": "📱 Телефон",
        "microwave": "🔥 Микроволновка", "oven": "🍳 Духовка", "refrigerator": "🧊 Холодильник",
        "book": "📚 Книга", "clock": "⏰ Часы", "vase": "🏺 Ваза", "scissors": "✂️ Ножницы",
        "teddy bear": "🧸 Мишка", "hair drier": "💨 Фен"
    };
    
    let model = null;
    let video = document.getElementById('video');
    let canvas = document.getElementById('canvas');
    let ctx = canvas.getContext('2d');
    let isRunning = false;
    let lastDetect = 0;
    let fpsCounter = { frames: 0, lastTime: performance.now() };
    let stream = null;
    let matchedFaceImg = document.getElementById('matchedFace');
    let cameraRequested = false;
    
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const objCountEl = document.getElementById('objCount');
    const dbCountEl = document.getElementById('dbCount');
    const fpsEl = document.getElementById('fps');
    const objectsList = document.getElementById('objectsList');
    const debugInfo = document.getElementById('debugInfo');
    const cameraBtn = document.getElementById('cameraBtn');
    const addFaceBtn = document.getElementById('addFaceBtn');
    const faceUpload = document.getElementById('faceUpload');
    const faceGallery = document.getElementById('faceGallery');
    const loading = document.getElementById('loading');
    
    // === СОХРАНЕНИЕ БАЗЫ В LOCALSTORAGE ===
    function saveFacesToLocalStorage() {
        localStorage.setItem('myFaces', JSON.stringify(faceDatabase));
    }
    
    function loadFacesFromLocalStorage() {
        const saved = localStorage.getItem('myFaces');
        if (saved) {
            try {
                faceDatabase = JSON.parse(saved);
                updateFaceGallery();
                debugInfo.innerText = `✅ Загружено ${faceDatabase.length} лиц из памяти телефона`;
            } catch(e) {}
        }
        dbCountEl.textContent = faceDatabase.length;
    }
    
    // === ОБНОВЛЕНИЕ ГАЛЕРЕИ ЛИЦ ===
    function updateFaceGallery() {
        faceGallery.innerHTML = '';
        faceDatabase.forEach((face, index) => {
            const img = document.createElement('img');
            img.src = face;
            img.className = 'face-thumb';
            img.onclick = () => {
                if (confirm('Удалить это лицо из базы?')) {
                    faceDatabase.splice(index, 1);
                    saveFacesToLocalStorage();
                    updateFaceGallery();
                    dbCountEl.textContent = faceDatabase.length;
                    debugInfo.innerText = `🗑️ Лицо удалено. Осталось ${faceDatabase.length}`;
                }
            };
            faceGallery.appendChild(img);
        });
        
        if (faceDatabase.length === 0) {
            const emptyMsg = document.createElement('div');
            emptyMsg.style.fontSize = '0.7em';
            emptyMsg.style.color = '#666';
            emptyMsg.innerText = '➕ Нажмите "ДОБАВИТЬ ЛИЦО" чтобы добавить фото';
            faceGallery.appendChild(emptyMsg);
        }
        
        dbCountEl.textContent = faceDatabase.length;
    }
    
    // === ДОБАВЛЕНИЕ ЛИЦА ИЗ ФОТО ===
    function addFaceFromPhoto(file) {
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = (e) => {
            const imgSrc = e.target.result;
            faceDatabase.push(imgSrc);
            saveFacesToLocalStorage();
            updateFaceGallery();
            debugInfo.innerText = `✅ Лицо добавлено! Всего: ${faceDatabase.length}`;
        };
        reader.readAsDataURL(file);
    }
    
    // === ДОБАВЛЕНИЕ ЛИЦА ИЗ КАДРА (снять текущее лицо) ===
    function captureFaceFromVideo() {
        if (!video.videoWidth) {
            debugInfo.innerText = '❌ Камера не активна';
            return;
        }
        
        // Создаём временный canvas для захвата области лица
        const tempCanvas = document.createElement('canvas');
        const tempCtx = tempCanvas.getContext('2d');
        
        // Берём центральную часть кадра (где обычно лицо)
        const centerX = video.videoWidth * 0.3;
        const centerY = video.videoHeight * 0.2;
        const size = Math.min(video.videoWidth, video.videoHeight) * 0.4;
        
        tempCanvas.width = 150;
        tempCanvas.height = 150;
        tempCtx.drawImage(video, centerX, centerY, size, size, 0, 0, 150, 150);
        
        const imgSrc = tempCanvas.toDataURL('image/jpeg');
        faceDatabase.push(imgSrc);
        saveFacesToLocalStorage();
        updateFaceGallery();
        debugInfo.innerText = `✅ Лицо сохранено из камеры! Всего: ${faceDatabase.length}`;
    }
    
    // === ПОКАЗ МИНИАТЮРЫ ПРИ ОБНАРУЖЕНИИ ЧЕЛОВЕКА ===
    function showMatchedFace() {
        if (faceDatabase.length > 0 && !matchedFaceImg.classList.contains('show')) {
            // Показываем случайное лицо из базы (для простоты)
            const randomIndex = Math.floor(Math.random() * faceDatabase.length);
            matchedFaceImg.src = faceDatabase[randomIndex];
            matchedFaceImg.classList.add('show');
            setTimeout(() => matchedFaceImg.classList.remove('show'), 2000);
            debugInfo.innerText = `✅ Найден человек! Совпадение с лицом из базы`;
        }
    }
    
    // === ЗАГРУЗКА МОДЕЛИ ===
    async function loadModel() {
        loading.classList.remove('hidden');
        debugInfo.innerText = '🧠 Загрузка модели...';
        model = await cocoSsd.load({ base: 'lite_mobilenet_v2' });
        loading.classList.add('hidden');
        debugInfo.innerText = '✅ Модель загружена! Нажмите "КАМЕРА"';
        statusText.textContent = 'Готов';
    }
    
    // === КАМЕРА ===
    async function startCamera() {
        if (cameraRequested) return;
        cameraRequested = true;
        
        debugInfo.innerText = '📷 Запрос доступа к камере...';
        
        try {
            const constraints = {
                video: {
                    facingMode: 'environment',
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                }
            };
            
            stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
            cameraBtn.classList.add('hidden');
            
            await new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    video.play();
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    resolve();
                };
            });
            
            debugInfo.innerText = '✅ Камера работает!';
            statusDot.classList.add('active');
            statusText.textContent = 'Работает';
            
            isRunning = true;
            requestAnimationFrame(detectLoop);
            
        } catch(err) {
            debugInfo.innerText = `❌ Ошибка: ${err.message}`;
            cameraBtn.classList.remove('hidden');
            cameraRequested = false;
        }
    }
    
    // === ОТРИСОВКА ===
    function drawPredictions(predictions) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        predictions.forEach(pred => {
            if (pred.score < 0.4) return;
            const [x, y, w, h] = pred.bbox;
            const label = `${objectNames[pred.class] || pred.class} ${Math.round(pred.score*100)}%`;
            
            ctx.strokeStyle = '#00ff88';
            ctx.strokeRect(x, y, w, h);
            ctx.fillStyle = '#000000aa';
            ctx.fillRect(x, y - 20, ctx.measureText(label).width + 8, 18);
            ctx.fillStyle = '#00ff88';
            ctx.fillText(label, x + 4, y - 6);
        });
    }
    
    function updateUI(predictions) {
        const filtered = predictions.filter(p => p.score >= 0.4);
        objCountEl.textContent = filtered.length;
        
        const hasPerson = filtered.some(p => p.class === 'person');
        if (hasPerson && faceDatabase.length > 0) {
            showMatchedFace();
        }
        
        if (filtered.length === 0) {
            objectsList.innerHTML = '<div class="object-tag">🔍 Наведи камеру на объекты</div>';
            return;
        }
        
        const grouped = {};
        filtered.forEach(p => {
            const name = objectNames[p.class] || p.class;
            if (!grouped[name]) grouped[name] = [];
            grouped[name].push(p.score);
        });
        
        objectsList.innerHTML = '';
        Object.entries(grouped).slice(0, 15).forEach(([name, scores]) => {
            const avg = Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
            const div = document.createElement('div');
            div.className = 'object-tag';
            div.innerHTML = `<span>${name}</span><span style="color:#00ff88;margin-left:6px;">${avg}%</span>`;
            objectsList.appendChild(div);
        });
    }
    
    // === ОСНОВНОЙ ЦИКЛ ===
    async function detectLoop() {
        if (!isRunning || !model || !video.videoWidth) {
            if (isRunning) requestAnimationFrame(detectLoop);
            return;
        }
        
        fpsCounter.frames++;
        const now = performance.now();
        if (now - fpsCounter.lastTime >= 1000) {
            fpsEl.textContent = fpsCounter.frames;
            fpsCounter.frames = 0;
            fpsCounter.lastTime = now;
        }
        
        if (now - lastDetect >= 350) {
            lastDetect = now;
            try {
                const predictions = await model.detect(video);
                drawPredictions(predictions);
                updateUI(predictions);
            } catch(e) {
                console.warn(e);
            }
        }
        
        requestAnimationFrame(detectLoop);
    }
    
    // === КНОПКИ ===
    cameraBtn.onclick = () => startCamera();
    
    addFaceBtn.onclick = () => {
        // Предлагаем выбрать: из галереи или снять с камеры
        const choice = confirm('Добавить лицо:\n• OK — выбрать фото из галереи\n• Отмена — снять текущее лицо с камеры');
        if (choice) {
            faceUpload.click();
        } else {
            if (!stream) {
                debugInfo.innerText = '❌ Сначала включите камеру';
                return;
            }
            captureFaceFromVideo();
        }
    };
    
    faceUpload.onchange = (e) => {
        if (e.target.files.length) {
            addFaceFromPhoto(e.target.files[0]);
        }
        faceUpload.value = '';
    };
    
    // === ЗАПУСК ===
    loadFacesFromLocalStorage();
    loadModel();
    
    window.addEventListener('beforeunload', () => {
        if (stream) stream.getTracks().forEach(t => t.stop());
    });
</script>
</body>
</html>
